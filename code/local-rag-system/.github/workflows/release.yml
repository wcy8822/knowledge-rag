name: Release & Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  test-before-release:
    name: Verify Tests Pass
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
        
    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test-before-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get version
      id: version
      run: |
        VERSION=$(cat VERSION)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: |
          local-rag-system:latest
          local-rag-system:${{ steps.version.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/image.tar
        
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: /tmp/image.tar
        retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-docker
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get version
      id: version
      run: |
        VERSION=$(cat VERSION)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Generate changelog entry
      id: changelog
      run: |
        # Extract version section from CHANGELOG.md
        sed -n '/^## \[${{ steps.version.outputs.version }}\]/,/^## \[/p' CHANGELOG.md | head -n -1 > /tmp/changelog.txt
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat /tmp/changelog.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.version }}
        release_name: Release v${{ steps.version.outputs.version }}
        body: ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: false

  publish-reports:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: test-before-release
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download test reports
      uses: actions/download-artifact@v3
      with:
        name: test-results-py3.9
        path: test_reports/
        
    - name: Publish test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-reports
        path: test_reports/
        retention-days: 90

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [test-before-release, build-docker, create-release]
    if: always()
    
    steps:
    - name: Check job statuses
      run: |
        if [ "${{ needs.test-before-release.result }}" = "success" ] && \
           [ "${{ needs.build-docker.result }}" = "success" ] && \
           [ "${{ needs.create-release.result }}" = "success" ]; then
          echo "✅ Release pipeline completed successfully!"
        else
          echo "❌ Release pipeline failed"
          exit 1
        fi
