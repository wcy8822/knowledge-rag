# MySQL MCP Server 配置
# 连接 + 权限 + 安全策略

connection:
  host: localhost
  port: 3306
  user: root
  password_source: env_file  # 从 ~/.secrets.env 读取
  password_env_key: MYSQL_ROOT_PASSWORD
  charset: utf8mb4
  connect_timeout: 10

security:
  # 只允许只读操作
  read_only: true
  allowed_statements: [SELECT, SHOW, DESCRIBE, EXPLAIN]
  blocked_keywords: [INSERT, UPDATE, DELETE, DROP, ALTER, CREATE, TRUNCATE, GRANT, REVOKE]

  # 库白名单（空=允许所有非系统库）
  allowed_databases: []
  blocked_databases: [information_schema, mysql, performance_schema, sys]

  # 敏感表/字段脱敏（预留，P1 实现）
  # sensitive_tables: []
  # mask_fields: []

limits:
  max_rows: 100          # 单次查询最多返回行数
  max_query_length: 4096 # SQL 最大长度
  query_timeout: 30      # 秒

audit:
  enabled: true
  log_file: ~/.allin_ai_safe/mysql-mcp-audit.log
  log_format: "{timestamp} | {tool} | {database} | {sql_preview}"

# 表→库 权威映射（用于自动修正 LLM 生成的 SQL）
