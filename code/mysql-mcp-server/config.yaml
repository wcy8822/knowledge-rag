# NL2SQL 配置
nl2sql:
  llm_api: http://localhost:11434/api/generate
  llm_model: qwen2.5:7b
  context_file: ~/.allin_ai_safe/nl2sql-context.md
  max_retries: 1
  temperature: 0.1
